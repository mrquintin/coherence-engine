apiVersion: v1
kind: ConfigMap
metadata:
  name: coherence-fund-config
data:
  COHERENCE_FUND_OUTBOX_BACKEND: "redis"
---
apiVersion: v1
kind: Secret
metadata:
  name: coherence-fund-secrets
stringData:
  REDIS_URL: "redis://redis-master.redis.svc.cluster.local:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: ""
  SQS_QUEUE_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coherence-fund-worker
spec:
  template:
    spec:
      containers:
        - name: worker
          command:
            - /bin/sh
            - -lc
            - >
              python -m coherence_engine dispatch-outbox
              --backend "${COHERENCE_FUND_OUTBOX_BACKEND}"
              --run-mode loop
              --batch-size 300
              --poll-seconds 1
              --topic-prefix "${COHERENCE_FUND_TOPIC_PREFIX}"
              --kafka-bootstrap-servers "${KAFKA_BOOTSTRAP_SERVERS}"
              --sqs-queue-url "${SQS_QUEUE_URL}"
              --sqs-region "${AWS_REGION}"
              --redis-url "${REDIS_URL}"

