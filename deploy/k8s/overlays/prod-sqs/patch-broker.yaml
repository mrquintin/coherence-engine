apiVersion: v1
kind: ConfigMap
metadata:
  name: coherence-fund-config
data:
  COHERENCE_FUND_OUTBOX_BACKEND: "sqs"
  AWS_REGION: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: coherence-fund-secrets
stringData:
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/123456789012/coherence-fund-events"
  KAFKA_BOOTSTRAP_SERVERS: ""
  REDIS_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coherence-fund-worker
spec:
  template:
    spec:
      containers:
        - name: worker
          command:
            - /bin/sh
            - -lc
            - >
              python -m coherence_engine dispatch-outbox
              --backend "${COHERENCE_FUND_OUTBOX_BACKEND}"
              --run-mode loop
              --batch-size 200
              --poll-seconds 2
              --topic-prefix "${COHERENCE_FUND_TOPIC_PREFIX}"
              --kafka-bootstrap-servers "${KAFKA_BOOTSTRAP_SERVERS}"
              --sqs-queue-url "${SQS_QUEUE_URL}"
              --sqs-region "${AWS_REGION}"
              --redis-url "${REDIS_URL}"

