apiVersion: apps/v1
kind: Deployment
metadata:
  name: coherence-fund-api
  namespace: coherence-fund
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coherence-fund-api
  template:
    metadata:
      labels:
        app: coherence-fund-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/coherence-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "coherence_engine", "serve-fund", "--host", "0.0.0.0", "--port", "8010"]
          ports:
            - name: http
              containerPort: 8010
          envFrom:
            - configMapRef:
                name: coherence-fund-config
            - secretRef:
                name: coherence-fund-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

