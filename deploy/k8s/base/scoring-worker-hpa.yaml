apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coherence-fund-scoring-worker
  namespace: coherence-fund
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coherence-fund-scoring-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
