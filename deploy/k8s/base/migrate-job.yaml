apiVersion: batch/v1
kind: Job
metadata:
  name: coherence-fund-migrate
  namespace: coherence-fund
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/your-org/coherence-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: coherence-fund-config
            - secretRef:
                name: coherence-fund-secrets

