{{- if .Values.pdb.scoringWorker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "coherence-fund.fullname" . }}-scoring-worker
spec:
  minAvailable: {{ .Values.pdb.scoringWorker.minAvailable }}
  selector:
    matchLabels:
      app: {{ include "coherence-fund.fullname" . }}-scoring-worker
{{- end }}
