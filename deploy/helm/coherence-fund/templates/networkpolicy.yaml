{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coherence-fund.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coherence-fund.fullname" . }}-allow-api-ingress
spec:
  podSelector:
    matchLabels:
      app: {{ include "coherence-fund.fullname" . }}-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8010
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coherence-fund.fullname" . }}-allow-app-egress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - {{ include "coherence-fund.fullname" . }}-api
          - {{ include "coherence-fund.fullname" . }}-worker
          - {{ include "coherence-fund.fullname" . }}-scoring-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
{{- end }}

