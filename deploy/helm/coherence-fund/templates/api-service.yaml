apiVersion: v1
kind: Service
metadata:
  name: {{ include "coherence-fund.fullname" . }}-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "coherence-fund.fullname" . }}-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

