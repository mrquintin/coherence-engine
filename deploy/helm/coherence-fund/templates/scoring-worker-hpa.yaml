{{- if .Values.hpa.scoringWorker.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "coherence-fund.fullname" . }}-scoring-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "coherence-fund.fullname" . }}-scoring-worker
  minReplicas: {{ .Values.hpa.scoringWorker.minReplicas }}
  maxReplicas: {{ .Values.hpa.scoringWorker.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.scoringWorker.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.scoringWorker.memoryUtilization }}
{{- end }}
