{{- if .Values.pdb.worker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "coherence-fund.fullname" . }}-worker
spec:
  minAvailable: {{ .Values.pdb.worker.minAvailable }}
  selector:
    matchLabels:
      app: {{ include "coherence-fund.fullname" . }}-worker
{{- end }}

