apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coherence-fund.fullname" . }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "coherence-fund.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "coherence-fund.fullname" . }}-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "coherence_engine", "serve-fund", "--host", "0.0.0.0", "--port", "8010"]
          ports:
            - name: http
              containerPort: 8010
          envFrom:
            - configMapRef:
                name: {{ include "coherence-fund.fullname" . }}-config
            - secretRef:
                name: {{ include "coherence-fund.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

