schema_version: secret-manifest-v1
# Canonical inventory of every named secret the backend reads at runtime.
# Policy values:
#   prod_required  — startup MUST resolve this when ENV=production; failure
#                    aborts boot.
#   prod_optional  — looked up if present; absence is logged but tolerated.
#   dev_optional   — only meaningful in non-prod; missing in prod is fine.
secrets:
  # ── database ───────────────────────────────────────────────────
  - name: COHERENCE_FUND_DATABASE_URL
    category: db
    policy: prod_optional
    owner: platform
    description: >
      Direct DATABASE_URL override used by tests and SQLite fallback.
      Production uses SUPABASE_DB_POOLER_URL.
  - name: SUPABASE_DB_POOLER_URL
    category: db
    policy: prod_required
    owner: platform
    description: pgbouncer transaction-pool URL for long-lived API workers.
  - name: SUPABASE_DB_URL
    category: db
    policy: prod_required
    owner: platform
    description: Direct Postgres URL used by Alembic migrations.
  - name: SUPABASE_DB_REPLICA_URL
    category: db
    policy: prod_optional
    owner: platform
    description: Optional read-replica URL; reads fall back to the primary.

  # ── auth (Supabase JWT — prompt 25) ────────────────────────────
  - name: SUPABASE_JWKS_URL
    category: auth
    policy: prod_required
    owner: platform
    description: Supabase project JWKS endpoint (RS256/ES256 verification).
  - name: SUPABASE_JWT_AUD
    category: auth
    policy: prod_optional
    owner: platform
    description: Expected JWT audience claim (default "authenticated").
  - name: SUPABASE_JWT_ISS
    category: auth
    policy: prod_required
    owner: platform
    description: Expected JWT issuer (Supabase project URL + "/auth/v1").
  - name: SUPABASE_SERVICE_ROLE_KEY
    category: auth
    policy: prod_required
    owner: platform
    description: Server-side Supabase service-role key for RLS bypass paths.

  # ── KYC / accreditation (prompt 26) ────────────────────────────
  - name: PERSONA_API_KEY
    category: kyc
    policy: prod_optional
    owner: compliance
    description: >
      Persona API key. Required only when Persona is the configured
      accreditation backend; otherwise routes return 503 PROVIDER_UNAVAILABLE.
  - name: PERSONA_WEBHOOK_SECRET
    category: kyc
    policy: prod_optional
    owner: compliance
  - name: PERSONA_TEMPLATE_ID
    category: kyc
    policy: prod_optional
    owner: compliance
  - name: ONFIDO_API_TOKEN
    category: kyc
    policy: prod_optional
    owner: compliance
  - name: ONFIDO_WEBHOOK_TOKEN
    category: kyc
    policy: prod_optional
    owner: compliance
  - name: ACCREDITATION_MANUAL_UPLOAD_SECRET
    category: kyc
    policy: prod_optional
    owner: compliance
    description: Manual operator-attested upload token (optional fallback).

  # ── secret manager bootstrap (legacy managed store) ────────────
  - name: COHERENCE_FUND_BOOTSTRAP_ADMIN_SECRET_REF
    category: bootstrap
    policy: prod_required
    owner: platform
    description: Reference (path) to the bootstrap-admin token in the managed store.
  - name: VAULT_ADDR
    category: bootstrap
    policy: prod_optional
    owner: platform
    description: HashiCorp Vault address; required only when SECRETS_BACKEND=vault.
  - name: VAULT_TOKEN
    category: bootstrap
    policy: prod_optional
    owner: platform
    description: HashiCorp Vault token; required only when SECRETS_BACKEND=vault.
  - name: DOPPLER_TOKEN
    category: bootstrap
    policy: prod_optional
    owner: platform
    description: Doppler service token; required only when SECRETS_BACKEND=doppler.

  # ── ops / observability ────────────────────────────────────────
  - name: GOVERNANCE_ESCALATION_RECEIPT_HMAC_KEY
    category: ops
    policy: prod_required
    owner: ops
    description: HMAC key for governance attestation receipt signing.
