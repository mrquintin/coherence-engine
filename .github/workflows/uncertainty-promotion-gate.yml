# Controlled canary/prod promotion using artifacts from a completed
# "Uncertainty recalibration" run. Requires explicit ack + per-stage approval token.
# Preserves governance audit JSONL when the source run published uncertainty-governance-audit-log.

name: Uncertainty promotion gate

on:
  workflow_dispatch:
    inputs:
      promotion_stage:
        description: "Target stage (canary or prod; shadow uses Uncertainty recalibration)"
        required: true
        type: choice
        options:
          - canary
          - prod
      source_run_id:
        description: "Run id of a completed Uncertainty recalibration workflow that published uncertainty-candidate-profile"
        required: true
        type: string
      governance_acknowledged:
        description: "Required true — confirms human review of candidate, policy, and source run"
        required: true
        type: boolean
      promotion_approval_token:
        description: "Must match UNCERTAINTY_CANARY_PROMOTION_TOKEN or UNCERTAINTY_PROD_PROMOTION_TOKEN"
        required: true
        type: string
      prod_baseline_profile_repo_path:
        description: "Repo-relative baseline JSON for prod delta gates (if omitted, uses prod.active.profile from downloaded registry when present)"
        required: false
        default: ""
        type: string
      policy_owning_team_attestation:
        description: "Owning team id/email for policy governance (must match vars.UNCERTAINTY_POLICY_OWNING_TEAM when set)"
        required: true
        type: string
      policy_owner_attestor:
        description: "Identity of the person/service attesting policy + promotion review"
        required: true
        type: string
      policy_baseline_approval_change_id:
        description: "Change/ticket id for approved baseline tied to this promotion (e.g. CHG-1234)"
        required: true
        type: string
      policy_ownership_attestation_effective_date:
        description: "ISO date YYYY-MM-DD when this ownership attestation was issued (rotation enforcement)"
        required: true
        type: string
      ownership_attestation_max_age_days:
        description: "Optional override; empty uses vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_MAX_AGE_DAYS or default 90"
        required: false
        default: ""
        type: string
      ownership_attestation_reminder_days_before_max:
        description: "Optional override; empty uses vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_REMINDER_DAYS_BEFORE_MAX or default 14"
        required: false
        default: ""
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: uncertainty-governance-${{ inputs.promotion_stage }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dispatch inputs
        env:
          STAGE: ${{ inputs.promotion_stage }}
          ACK: ${{ inputs.governance_acknowledged }}
          TEAM_ATTEST: ${{ inputs.policy_owning_team_attestation }}
          ATTESTOR: ${{ inputs.policy_owner_attestor }}
          CHANGE_ID: ${{ inputs.policy_baseline_approval_change_id }}
          EXPECT_TEAM: ${{ vars.UNCERTAINTY_POLICY_OWNING_TEAM }}
          EFF: ${{ inputs.policy_ownership_attestation_effective_date }}
          MAX_IN: ${{ inputs.ownership_attestation_max_age_days }}
          REM_IN: ${{ inputs.ownership_attestation_reminder_days_before_max }}
          MAX_VAR: ${{ vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_MAX_AGE_DAYS }}
          REM_VAR: ${{ vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_REMINDER_DAYS_BEFORE_MAX }}
          GOVERNANCE_ATTESTATION_WORKFLOW_FILE: uncertainty-promotion-gate.yml
          ESCALATION_OUT: artifacts/governance_attestation_escalation.json
          GOVERNANCE_PROMOTION_ENV: ${{ inputs.promotion_stage }}
          GOVERNANCE_GITHUB_ENVIRONMENT: uncertainty-governance-${{ inputs.promotion_stage }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ "${ACK}" != "true" ]; then
            echo "::error::governance_acknowledged must be true"
            exit 1
          fi
          if [ "${STAGE}" != "canary" ] && [ "${STAGE}" != "prod" ]; then
            echo "::error::promotion_stage must be canary or prod"
            exit 1
          fi
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          TA=$(trim "${TEAM_ATTEST}")
          AT=$(trim "${ATTESTOR}")
          CI=$(trim "${CHANGE_ID}")
          if [ -z "${TA}" ]; then
            echo "::error::policy_owning_team_attestation must be non-empty"
            exit 1
          fi
          if [ -z "${AT}" ]; then
            echo "::error::policy_owner_attestor must be non-empty"
            exit 1
          fi
          if [ "${#CI}" -lt 2 ]; then
            echo "::error::policy_baseline_approval_change_id must be non-trivial (min 2 characters after trim)"
            exit 1
          fi
          ET=$(trim "${EXPECT_TEAM:-}")
          if [ -n "${ET}" ] && [ "${TA}" != "${ET}" ]; then
            echo "::error::policy_owning_team_attestation must exactly match repository variable UNCERTAINTY_POLICY_OWNING_TEAM (after trim)"
            exit 1
          fi
          python deploy/scripts/report_governance_attestation_age.py validate-ownership-attestation

      - name: Route governance attestation escalation (optional)
        if: always()
        env:
          GOVERNANCE_ATTESTATION_ESCALATION_IN: artifacts/governance_attestation_escalation.json
          GOVERNANCE_PROMOTION_ENV: ${{ inputs.promotion_stage }}
          GOVERNANCE_GITHUB_ENVIRONMENT: uncertainty-governance-${{ inputs.promotion_stage }}
          GOVERNANCE_ESCALATION_ROUTING_MAP_JSON: deploy/ops/governance-attestation-escalation-routing-map.example.json
          GOVERNANCE_ESCALATION_SINK: file
        run: python deploy/scripts/route_governance_attestation_escalation.py

      - name: Upload governance attestation escalation record
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: governance-attestation-escalation
          path: artifacts/governance_attestation_escalation.json
          if-no-files-found: ignore

      - name: Optional governance policy SHA pin
        env:
          PIN: ${{ vars.UNCERTAINTY_GOVERNANCE_POLICY_SHA256 }}
        run: |
          set -euo pipefail
          if [ -z "${PIN:-}" ]; then
            echo "No UNCERTAINTY_GOVERNANCE_POLICY_SHA256 repository variable set; skipping pin."
            exit 0
          fi
          got=$(sha256sum data/governed/uncertainty_governance_policy.json | awk '{print $1}')
          if [ "${got}" != "${PIN}" ]; then
            echo "::error::Governance policy SHA256 mismatch (got ${got}, expected ${PIN})"
            exit 1
          fi
          echo "Policy SHA256 pin OK."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Download artifacts from source run
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p artifacts dl
          gh run download "${RUN_ID}" -n uncertainty-candidate-profile -D dl/candidate || {
            echo "::error::Could not download uncertainty-candidate-profile from run ${RUN_ID}"
            exit 1
          }
          gh run download "${RUN_ID}" -n uncertainty-profile-registry -D dl/registry || true
          gh run download "${RUN_ID}" -n uncertainty-governance-audit-log -D dl/audit || true
          cand=$(find dl/candidate -type f -name 'uncertainty_candidate_profile.json' | head -1)
          if [ -z "${cand}" ]; then
            echo "::error::uncertainty_candidate_profile.json not found inside candidate artifact"
            exit 1
          fi
          cp -f "${cand}" artifacts/uncertainty_candidate_profile.json
          reg=$(find dl/registry -type f -name 'uncertainty_profile_registry.json' 2>/dev/null | head -1)
          if [ -n "${reg}" ]; then
            cp -f "${reg}" artifacts/uncertainty_profile_registry.json
          fi
          aud=$(find dl/audit -type f -name 'uncertainty_governance_audit.jsonl' 2>/dev/null | head -1)
          if [ -n "${aud}" ]; then
            cp -f "${aud}" artifacts/uncertainty_governance_audit.jsonl
          else
            : > artifacts/uncertainty_governance_audit.jsonl
          fi

      - name: Governance token gate
        env:
          STAGE: ${{ inputs.promotion_stage }}
          TOKEN_INPUT: ${{ inputs.promotion_approval_token }}
          SEC_CANARY: ${{ secrets.UNCERTAINTY_CANARY_PROMOTION_TOKEN }}
          SEC_PROD: ${{ secrets.UNCERTAINTY_PROD_PROMOTION_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${STAGE}" = "canary" ]; then
            SEC="${SEC_CANARY}"
            NAME="UNCERTAINTY_CANARY_PROMOTION_TOKEN"
          else
            SEC="${SEC_PROD}"
            NAME="UNCERTAINTY_PROD_PROMOTION_TOKEN"
          fi
          if [ -z "${SEC}" ]; then
            echo "::error::Repository secret ${NAME} must be set for ${STAGE} promotion"
            exit 1
          fi
          if [ "${TOKEN_INPUT}" != "${SEC}" ]; then
            echo "::error::promotion_approval_token does not match ${NAME}"
            exit 1
          fi
          echo "Approval token verified for ${STAGE}."

      - name: Resolve prod baseline profile
        if: inputs.promotion_stage == 'prod'
        env:
          REPO_BASELINE: ${{ inputs.prod_baseline_profile_repo_path }}
        run: |
          set -euo pipefail
          if [ -n "${REPO_BASELINE}" ]; then
            if [ ! -f "${REPO_BASELINE}" ]; then
              echo "::error::prod_baseline_profile_repo_path not found: ${REPO_BASELINE}"
              exit 1
            fi
            cp -f "${REPO_BASELINE}" artifacts/prod_baseline_resolved.json
          elif [ -f artifacts/uncertainty_profile_registry.json ]; then
            python <<'PY'
          import json
          import sys
          from pathlib import Path

          reg_path = Path("artifacts/uncertainty_profile_registry.json")
          reg = json.loads(reg_path.read_text(encoding="utf-8"))
          prod = (reg.get("stages") or {}).get("prod") or {}
          active = prod.get("active")
          prof = active.get("profile") if isinstance(active, dict) else None
          if not isinstance(prof, dict) or not prof:
              print(
                  "Error: no prod baseline in registry; set prod_baseline_profile_repo_path",
                  file=sys.stderr,
              )
              sys.exit(1)
          Path("artifacts/prod_baseline_resolved.json").write_text(
              json.dumps(prof, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          else
            echo "::error::Prod promotion needs prod_baseline_profile_repo_path or a downloaded registry with prod.active.profile"
            exit 1
          fi

      - name: Promote (canary)
        if: inputs.promotion_stage == 'canary'
        env:
          COHERENCE_UNCERTAINTY_GOVERNANCE_HMAC_KEY: ${{ secrets.UNCERTAINTY_GOVERNANCE_HMAC_KEY }}
        run: |
          set -euo pipefail
          python -m coherence_engine uncertainty-profile promote \
            --registry artifacts/uncertainty_profile_registry.json \
            --stage canary \
            --profile artifacts/uncertainty_candidate_profile.json \
            --governance-policy data/governed/uncertainty_governance_policy.json \
            --governance-audit-log artifacts/uncertainty_governance_audit.jsonl \
            --reason "workflow_dispatch Uncertainty promotion gate (canary) source_run=${{ inputs.source_run_id }}"

      - name: Promote (prod)
        if: inputs.promotion_stage == 'prod'
        env:
          COHERENCE_UNCERTAINTY_GOVERNANCE_HMAC_KEY: ${{ secrets.UNCERTAINTY_GOVERNANCE_HMAC_KEY }}
        run: |
          set -euo pipefail
          python -m coherence_engine uncertainty-profile promote \
            --registry artifacts/uncertainty_profile_registry.json \
            --stage prod \
            --profile artifacts/uncertainty_candidate_profile.json \
            --baseline-profile artifacts/prod_baseline_resolved.json \
            --governance-policy data/governed/uncertainty_governance_policy.json \
            --governance-audit-log artifacts/uncertainty_governance_audit.jsonl \
            --reason "workflow_dispatch Uncertainty promotion gate (prod) source_run=${{ inputs.source_run_id }}"

      - name: Write promotion continuity manifest
        env:
          STAGE: ${{ inputs.promotion_stage }}
          RUN_ID: ${{ inputs.source_run_id }}
          TEAM_ATTEST: ${{ inputs.policy_owning_team_attestation }}
          ATTESTOR: ${{ inputs.policy_owner_attestor }}
          CHANGE_ID: ${{ inputs.policy_baseline_approval_change_id }}
          GH_ENV_NAME: uncertainty-governance-${{ inputs.promotion_stage }}
          EFF: ${{ inputs.policy_ownership_attestation_effective_date }}
          MAX_IN: ${{ inputs.ownership_attestation_max_age_days }}
          REM_IN: ${{ inputs.ownership_attestation_reminder_days_before_max }}
          MAX_VAR: ${{ vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_MAX_AGE_DAYS }}
          REM_VAR: ${{ vars.UNCERTAINTY_OWNERSHIP_ATTESTATION_REMINDER_DAYS_BEFORE_MAX }}
        run: |
          set -euo pipefail
          python <<'PY'
          import hashlib
          import json
          import os
          from datetime import date, datetime, timezone
          from pathlib import Path

          def _pi(raw: str | None, default: int) -> int:
              s = (raw or "").strip()
              if not s:
                  return default
              return int(s)

          policy = Path("data/governed/uncertainty_governance_policy.json")
          ph = hashlib.sha256(policy.read_bytes()).hexdigest()
          eff_raw = (os.environ.get("EFF") or "").strip()
          max_age = _pi(os.environ.get("MAX_IN"), _pi(os.environ.get("MAX_VAR"), 90))
          rem = _pi(os.environ.get("REM_IN"), _pi(os.environ.get("REM_VAR"), 14))
          eff = date.fromisoformat(eff_raw[:10])
          today = datetime.now(timezone.utc).date()
          age = (today - eff).days
          warn_from = max(0, max_age - rem)
          man = {
              "promotion_stage": os.environ["STAGE"],
              "github_environment": os.environ["GH_ENV_NAME"],
              "source_recalibration_run_id": os.environ["RUN_ID"],
              "governance_policy_sha256": ph,
              "governance_policy_path": str(policy),
              "registry_path": "artifacts/uncertainty_profile_registry.json",
              "audit_log_path": "artifacts/uncertainty_governance_audit.jsonl",
              "policy_ownership_attestation": {
                  "owning_team": os.environ["TEAM_ATTEST"].strip(),
                  "attestor_identity": os.environ["ATTESTOR"].strip(),
                  "approval_change_id": os.environ["CHANGE_ID"].strip(),
                  "attestation_effective_date": eff_raw,
                  "age_days_at_promotion": age,
                  "max_age_days_policy": max_age,
                  "reminder_days_before_max": rem,
                  "reminder_window_start_age_days": warn_from,
                  "stale_for_max_age_policy": age > max_age,
                  "within_staleness_reminder_window": (age <= max_age) and age >= warn_from,
              },
          }
          Path("artifacts/promotion_continuity_manifest.json").write_text(
              json.dumps(man, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: uncertainty-profile-registry
          path: artifacts/uncertainty_profile_registry.json
          if-no-files-found: error

      - name: Upload governance audit log
        uses: actions/upload-artifact@v4
        with:
          name: uncertainty-governance-audit-log
          path: artifacts/uncertainty_governance_audit.jsonl
          if-no-files-found: error

      - name: Upload continuity manifest
        uses: actions/upload-artifact@v4
        with:
          name: uncertainty-promotion-continuity-manifest
          path: artifacts/promotion_continuity_manifest.json
          if-no-files-found: error
