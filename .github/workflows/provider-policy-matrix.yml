name: Provider Policy Matrix

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  provider-policy-contracts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider_profile: [aws, gcp, vault]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run provider policy contracts
        env:
          COHERENCE_TEST_PROVIDER_PROFILE: ${{ matrix.provider_profile }}
        run: |
          python -m pytest tests/test_secret_manager_policy_matrix.py -q

