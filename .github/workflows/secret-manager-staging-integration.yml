name: Secret Manager Staging Integration

on:
  workflow_dispatch:
    inputs:
      provider_profile:
        description: "Cloud provider profile for staged integration test"
        required: true
        default: aws
        type: choice
        options:
          - aws
          - gcp
          - vault
      bootstrap_secret_ref:
        description: "Staging bootstrap secret reference to read"
        required: true
        type: string
      aws_region:
        description: "AWS region (profile=aws)"
        required: false
        default: us-east-1
        type: string
      aws_role_to_assume:
        description: "Optional AWS role ARN for OIDC auth"
        required: false
        type: string
      gcp_workload_identity_provider:
        description: "Optional GCP workload identity provider resource"
        required: false
        type: string
      gcp_service_account:
        description: "Optional GCP service account email"
        required: false
        type: string
      vault_addr:
        description: "Vault HTTPS address (profile=vault)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  staging-provider-integration:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,fund-workers]"

      - name: Configure AWS credentials (optional OIDC)
        if: ${{ inputs.provider_profile == 'aws' && inputs.aws_role_to_assume != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Configure GCP credentials (optional WIF)
        if: ${{ inputs.provider_profile == 'gcp' && inputs.gcp_workload_identity_provider != '' && inputs.gcp_service_account != '' }}
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account: ${{ inputs.gcp_service_account }}
          token_format: access_token

      - name: Export provider environment
        run: |
          echo "COHERENCE_CLOUD_SECRET_MANAGER_INTEGRATION=1" >> "$GITHUB_ENV"
          echo "COHERENCE_TEST_PROVIDER_PROFILE=${{ inputs.provider_profile }}" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_BOOTSTRAP_ADMIN_ENABLED=true" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_BOOTSTRAP_ADMIN_SECRET_REF=${{ inputs.bootstrap_secret_ref }}" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_SECRET_MANAGER_PROVIDER=${{ inputs.provider_profile }}" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_SECRET_MANAGER_STRICT_POLICY=true" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_SECRET_MANAGER_ALLOW_STATIC_CREDENTIALS=false" >> "$GITHUB_ENV"
          echo "COHERENCE_FUND_SECRET_MANAGER_TOKEN_FIELD=token" >> "$GITHUB_ENV"
          if [ "${{ inputs.provider_profile }}" = "aws" ]; then
            echo "COHERENCE_FUND_AWS_REGION=${{ inputs.aws_region }}" >> "$GITHUB_ENV"
          fi
          if [ "${{ inputs.provider_profile }}" = "gcp" ] && [ -n "${{ steps.gcp_auth.outputs.access_token }}" ]; then
            echo "COHERENCE_FUND_GCP_ACCESS_TOKEN=${{ steps.gcp_auth.outputs.access_token }}" >> "$GITHUB_ENV"
          fi
          if [ "${{ inputs.provider_profile }}" = "vault" ]; then
            echo "COHERENCE_FUND_VAULT_ADDR=${{ inputs.vault_addr }}" >> "$GITHUB_ENV"
            echo "COHERENCE_FUND_VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Validate integration inputs
        run: |
          case "${{ inputs.provider_profile }}" in
            aws)
              if [ -z "${{ inputs.bootstrap_secret_ref }}" ]; then
                echo "bootstrap_secret_ref is required for aws profile" >&2
                exit 1
              fi
              ;;
            gcp)
              if [ -z "${{ inputs.bootstrap_secret_ref }}" ]; then
                echo "bootstrap_secret_ref is required for gcp profile" >&2
                exit 1
              fi
              if [ -z "${COHERENCE_FUND_GCP_ACCESS_TOKEN:-}" ]; then
                echo "GCP access token is required; configure WIF inputs." >&2
                exit 1
              fi
              ;;
            vault)
              if [ -z "${{ inputs.vault_addr }}" ]; then
                echo "vault_addr is required for vault profile" >&2
                exit 1
              fi
              if [ -z "${{ secrets.VAULT_TOKEN }}" ]; then
                echo "VAULT_TOKEN secret is required for vault profile" >&2
                exit 1
              fi
              ;;
            *)
              echo "unsupported provider_profile: ${{ inputs.provider_profile }}" >&2
              exit 1
              ;;
          esac

      - name: Run cloud-backed staging integration test
        run: |
          python -m pytest tests/integration/test_secret_manager_cloud_staging.py -m cloud_integration -v
